<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>4択クイズ</title>
  <style>
    body { font-family: sans-serif; text-align: center; margin: 40px; }
    #question { font-size: 1.4em; margin-bottom: 20px; }
    .choice { display: block; margin: 10px auto; padding: 10px 20px; width: 60%; font-size: 1em; }
    #result { font-size: 1.2em; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>4択クイズ</h1>
  <div id="question"></div>

  <!-- ★ 画像表示用の img タグを追加 -->
  <img id="qimage" style="display:none; max-width:80%; margin:20px auto;">

  <div id="choices"></div>
  <div id="result"></div>

  <script>
    async function loadQuestions() {
      try {
        // GitHub Pages の正しいパス（fe-app と同じ階層）
        const response = await fetch('./questions.json');

        if (!response.ok) {
          throw new Error('Failed to load questions.json (HTTP ' + response.status + ')');
        }

        const data = await response.json();
        return data;

      } catch (err) {
        alert('問題データの読み込みに失敗しました: ' + err.message);
        console.error(err);
        return [];
      }
    }

    async function startQuiz() {
      const questions = await loadQuestions();
      if (questions.length === 0) return;

      let current = 0;
      showQuestion(questions[current]);

      function showQuestion(q) {
        document.getElementById('question').textContent = q.question;

        // ★ type に応じて画像を表示する処理を追加
        const img = document.getElementById('qimage');
        if (q.type === "image" || q.type === "text-image") {
          img.src = q.image;
          img.style.display = "block";
        } else {
          img.style.display = "none";
        }

        const choicesDiv = document.getElementById('choices');
        choicesDiv.innerHTML = '';

        q.choices.forEach((choice, i) => {
          const btn = document.createElement('button');
          btn.textContent = choice;
          btn.className = 'choice';

          btn.onclick = () => {
            const result = document.getElementById('result');

            if (i === q.answer) {
              result.textContent = '正解！';
              result.style.color = 'green';
            } else {
              result.textContent = '不正解…';
              result.style.color = 'red';
            }

            setTimeout(() => {
              current++;
              if (current < questions.length) {
                result.textContent = '';
                showQuestion(questions[current]);
              } else {
                document.getElementById('question').textContent = '終了！';
                choicesDiv.innerHTML = '';
                img.style.display = "none"; // ★ 最終問題後は画像を消す
                result.textContent = 'お疲れさまでした！';
              }
            }, 1000);
          };

          choicesDiv.appendChild(btn);
        });
      }
    }

    startQuiz();
  </script>
</body>
</html>
